[pytest]
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(name)s: %(message)s
log_cli_date_format = %H:%M:%S
log_level = INFO
asyncio_mode = auto

markers =
    integration: marks tests that require a live connection (deselect with '-m "not integration"')

addopts = -vv --tb=long --showlocals
